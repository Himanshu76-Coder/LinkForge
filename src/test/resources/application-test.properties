# ==========================================
# LinkForge - Test Configuration
# Uses H2 in-memory DB - no live MySQL needed
# ==========================================

# H2 in-memory database
spring.datasource.url=jdbc:h2:mem:linkforge_test;DB_CLOSE_DELAY=-1;MODE=MySQL
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=root
spring.datasource.password=

# Let Hibernate create schema from entities (Flyway disabled for tests)
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.show-sql=false

# Disable Flyway for tests
spring.flyway.enabled=false

# JWT test configuration
jwt.secret=test-secret-key-minimum-256-bits-long-for-hs256-algorithm-testing
jwt.access-token-expiration=900000
jwt.refresh-token-expiration=604800000

# Base URL for short link construction
app.base-url=http://localhost:8080
